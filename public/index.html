<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة عشوائية شاملة | نص وفيديو</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --chat-bg: #ffffff; --text-main: #1c1e21;
            --text-muted: #8b929a; --msg-mine: #ffce00; --msg-other: #e4e6eb;
            --accent: #333333; --border: #e0e0e0; --danger: #ff4757;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-main);
            height: 100dvh; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; overflow: hidden;
        }

        .app-container { 
            width: 100%; max-width: 800px; height: 100dvh;
            background: var(--chat-bg); display: flex; flex-direction: column; 
            position: relative; overflow: hidden;
        }

        @media (min-width: 800px) {
            .app-container { height: 90vh; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--chat-bg); z-index: 10; }
        .header h1 { font-size: 20px; margin: 0; }
        
        /* شاشة الاختيار (نص أو فيديو) */
        #selectionScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; background: var(--chat-bg); }
        #selectionScreen h2 { font-size: 24px; margin-bottom: 30px; color: var(--text-main); }
        .choice-btn { width: 100%; max-width: 300px; padding: 20px; margin: 10px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.2s; }
        .choice-btn:active { transform: scale(0.95); }
        .btn-text { background-color: var(--text-main); color: white; }
        .btn-video { background-color: var(--danger); color: white; }

        /* واجهة الدردشة الرئيسية */
        #chatScreen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        
        /* منطقة الفيديو (مقسمة 50/50) */
        #videoContainer { display: none; width: 100%; height: 40vh; background: #000; flex-direction: row; border-bottom: 2px solid var(--accent); }
        .video-box { flex: 1; height: 100%; position: relative; border-left: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { transform: scaleX(-1); } /* لجعل الكاميرا كالمرآة لك */
        .video-label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        /* لتصميم الهواتف (نجعل الفيديو فوق بعض ليكون أوضح) */
        @media (max-width: 600px) {
            #videoContainer { flex-direction: column; height: 50vh; }
            .video-box { border-left: none; border-bottom: 1px solid #333; }
        }

        /* شريط التحكم والتخطي */
        .top-actions { display: flex; justify-content: center; padding: 10px; background: var(--bg-color); border-bottom: 1px solid var(--border); }
        .skip-btn { background-color: var(--msg-mine); color: black; padding: 10px 30px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; max-width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* منطقة الرسائل النصية */
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--chat-bg); }
        .message { padding: 10px 15px; border-radius: 20px; max-width: 80%; word-wrap: break-word; line-height: 1.4; font-size: 15px; }
        .my-msg { background-color: var(--msg-mine); color: #000; align-self: flex-start; border-bottom-right-radius: 5px; }
        .stranger-msg { background-color: var(--msg-other); color: var(--text-main); align-self: flex-end; border-bottom-left-radius: 5px; }
        .system-msg { align-self: center; background: transparent; color: var(--text-muted); font-size: 0.9em; font-weight: bold; padding: 5px; text-align: center; }

        /* صندوق الإدخال */
        .input-area { display: flex; padding: 10px; border-top: 1px solid var(--border); gap: 10px; background: var(--bg-color); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px 20px; border: 1px solid var(--border); border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { padding: 10px 20px; border: none; background-color: var(--accent); color: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .send-btn:disabled { background-color: var(--text-muted); cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>💬 دردشة عشوائية</h1>
        </div>

        <div id="selectionScreen">
            <h2>كيف تفضل أن تتواصل اليوم؟</h2>
            <button class="choice-btn btn-text" onclick="startApp('text')">
                💬 دردشة نصية فقط
            </button>
            <button class="choice-btn btn-video" onclick="startApp('video')">
                🎥 دردشة فيديو (مع نص)
            </button>
            <p id="camError" style="color: var(--danger); margin-top: 15px; font-weight: bold; display: none;">⚠️ يرجى السماح بالكاميرا أولاً</p>
        </div>

        <div id="chatScreen">
            <div id="videoContainer">
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">أنت</div>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label">الغريب</div>
                </div>
            </div>

            <div class="top-actions">
                <button class="skip-btn" id="nextBtn">تخطي (شخص جديد) ⏭️</button>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="اكتب رسالتك..." disabled>
                <button class="send-btn" id="sendBtn" disabled>إرسال</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // عناصر الواجهة
        const selectionScreen = document.getElementById('selectionScreen');
        const chatScreen = document.getElementById('chatScreen');
        const videoContainer = document.getElementById('videoContainer');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const nextBtn = document.getElementById('nextBtn');
        const camError = document.getElementById('camError');

        let currentChatType = '';
        let localStream;
        let peerConnection;
        
        const iceServers = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]
        };

        // دالة إضافة الرسائل النصية
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.textContent = text; 
            div.className = `message ${type}`;
            messages.appendChild(div); 
            messages.scrollTop = messages.scrollHeight;
        }

        // 1. بدء التطبيق بناءً على الاختيار
        async function startApp(type) {
            currentChatType = type;
            camError.style.display = 'none';

            if (type === 'video') {
                try {
                    // طلب الكاميرا أولاً
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    localVideo.srcObject = localStream;
                    videoContainer.style.display = 'flex'; // إظهار الشاشة المقسمة
                } catch (err) {
                    camError.style.display = 'block';
                    return; // إيقاف العملية إذا رفض الكاميرا
                }
            } else {
                videoContainer.style.display = 'none'; // إخفاء الفيديو في الدردشة النصية
            }

            // إخفاء شاشة الاختيار وإظهار الدردشة
            selectionScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            
            // إخبار الخادم بنوع الدردشة للبحث عن شريك
            socket.emit('start', type);
        }

        // 2. زر التخطي (Next)
        nextBtn.addEventListener('click', () => {
            msgInput.disabled = true; 
            sendBtn.disabled = true;
            
            // تنظيف مكالمة الفيديو السابقة
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            
            socket.emit('next');
        });

        // 3. أحداث النظام من الخادم
        socket.on('waiting', (msg) => addMessage(msg, 'system-msg'));
        
        socket.on('chat start', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = false; sendBtn.disabled = false; msgInput.focus();
        });

        socket.on('system clear', () => { messages.innerHTML = ''; });
        
        socket.on('partner disconnected', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = true; sendBtn.disabled = true;
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
        });

        // إرسال واستقبال الرسائل النصية
        function sendMessage() {
            const text = msgInput.value.trim();
            if (text) {
                socket.emit('chat message', text); 
                addMessage(text, 'my-msg');
                msgInput.value = ''; msgInput.focus();
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        socket.on('chat message', (msg) => addMessage(msg, 'stranger-msg'));

        // ----------------------------------------------------
        // 4. محرك الـ WebRTC (مكالمة الفيديو)
        // ----------------------------------------------------
        
        socket.on('match', (data) => {
            addMessage(data.message, 'system-msg');
            msgInput.disabled = false; sendBtn.disabled = false;
            
            // تفعيل الفيديو فقط إذا كان هذا هو اختيار المستخدم
            if (currentChatType === 'video') {
                createPeerConnection();

                if (data.isCaller) {
                    peerConnection.createOffer()
                        .then(offer => peerConnection.setLocalDescription(offer))
                        .then(() => socket.emit('offer', peerConnection.localDescription));
                }
            }
        });

        socket.on('offer', (offer) => {
            if (currentChatType !== 'video') return;
            if (!peerConnection) createPeerConnection();
            
            peerConnection.setRemoteDescription(new RTCSessionDescription(offer))
                .then(() => peerConnection.createAnswer())
                .then(answer => peerConnection.setLocalDescription(answer))
                .then(() => socket.emit('answer', peerConnection.localDescription));
        });

        socket.on('answer', (answer) => {
            if (peerConnection) peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('ice-candidate', (candidate) => {
            if (peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(iceServers);

            // إرسال الكاميرا والصوت للطرف الآخر
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }

            // استقبال وعرض كاميرا الغريب
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };

            // اكتشاف مسارات الاتصال
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', event.candidate);
                }
            };
        }
    </script>
</body>
</html>

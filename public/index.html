<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة عشوائية | Random Chat</title>
    <style>
        /* إعدادات الألوان الأساسية (الوضع الفاتح) */
        :root {
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #8b929a;
            --msg-mine: #ffce00; /* لون مميز لرسائلك */
            --msg-other: #e4e6eb;
            --accent: #333333;
            --border: #e0e0e0;
        }

        /* إعدادات الألوان (الوضع الليلي) */
        body.dark-mode {
            --bg-color: #18191a;
            --chat-bg: #242526;
            --text-main: #e4e6eb;
            --msg-mine: #d4aa00;
            --msg-other: #3a3b3c;
            --accent: #ffce00;
            --border: #3a3b3c;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; padding: 20px;
        }

        .header {
            width: 100%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 24px; color: var(--text-main); }
        
        .theme-btn {
            background: var(--chat-bg); color: var(--text-main);
            border: 1px solid var(--border); padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-container { 
            width: 100%; max-width: 800px; height: 70vh;
            background: var(--chat-bg); border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border);
        }

        .messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
        }

        .message { 
            padding: 12px 18px; border-radius: 20px; 
            max-width: 75%; word-wrap: break-word; line-height: 1.4;
        }
        
        .my-msg { background-color: var(--msg-mine); color: #000; align-self: flex-start; border-bottom-right-radius: 5px; }
        .stranger-msg { background-color: var(--msg-other); color: var(--text-main); align-self: flex-end; border-bottom-left-radius: 5px; }
        .system-msg { align-self: center; background: transparent; color: var(--text-muted); font-size: 0.9em; font-weight: bold; padding: 5px;}

        /* مؤشر الكتابة */
        .typing-indicator {
            align-self: flex-end; font-size: 0.85em; color: var(--text-muted);
            margin-top: -5px; margin-bottom: 10px; display: none; font-style: italic;
        }

        .input-area { 
            display: flex; padding: 15px; background: var(--chat-bg); 
            border-top: 1px solid var(--border); gap: 10px;
        }

        input { 
            flex: 1; padding: 15px; border: 1px solid var(--border); 
            border-radius: 25px; outline: none; background: var(--bg-color); color: var(--text-main);
            font-size: 16px;
        }

        button { 
            padding: 10px 25px; border: none; background-color: var(--accent); 
            color: #fff; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold;
        }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; }
        .skip-btn { background-color: #ff4757; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>💬 دردشة عشوائية</h1>
        <button class="theme-btn" onclick="toggleTheme()">الوضع الليلي 🌙</button>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="typing-indicator" id="typingIndicator">الغريب يكتب الآن... ✍️</div>
        <div class="input-area">
            <button class="skip-btn" id="nextBtn" onclick="location.reload()">تخطي</button>
            <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." disabled>
            <button id="sendBtn" disabled>إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let typingTimer;

        // نظام الوضع الليلي
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-btn');
            if(document.body.classList.contains('dark-mode')) {
                btn.textContent = "الوضع الفاتح ☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = "الوضع الليلي 🌙";
                localStorage.setItem('theme', 'light');
            }
        }
        // استرجاع الإعداد المحفوظ
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.textContent = text;
            div.className = `message ${type}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        socket.on('waiting', (msg) => addMessage(msg, 'system-msg'));
        
        socket.on('chat start', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = false;
            sendBtn.disabled = false;
            msgInput.focus();
        });

        socket.on('partner disconnected', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = true;
            sendBtn.disabled = true;
            typingIndicator.style.display = 'none';
        });

        socket.on('chat message', (msg) => {
            addMessage(msg, 'stranger-msg');
            typingIndicator.style.display = 'none';
        });

        // أحداث مؤشر الكتابة
        msgInput.addEventListener('input', () => {
            socket.emit('typing');
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit('stop typing');
            }, 1000);
        });

        socket.on('typing', () => { typingIndicator.style.display = 'block'; messages.scrollTop = messages.scrollHeight; });
        socket.on('stop typing', () => { typingIndicator.style.display = 'none'; });

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text) {
                socket.emit('chat message', text);
                addMessage(text, 'my-msg');
                msgInput.value = '';
                socket.emit('stop typing');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>

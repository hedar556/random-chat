<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة عشوائية | Random Chat</title>
    <style>
        :root {
            --bg-color: #f0f2f5; --chat-bg: #ffffff; --text-main: #1c1e21;
            --text-muted: #8b929a; --msg-mine: #ffce00; --msg-other: #e4e6eb;
            --accent: #333333; --border: #e0e0e0;
        }
        body.dark-mode {
            --bg-color: #18191a; --chat-bg: #242526; --text-main: #e4e6eb;
            --msg-mine: #d4aa00; --msg-other: #3a3b3c; --accent: #ffce00;
            --border: #3a3b3c;
        }
        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; margin: 0; padding: 0; }
        
        /* نظام Canvas - الشاشة الكاملة وتجاهل مشاكل المتصفح */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            height: 100dvh; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; overflow: hidden;
        }

        .chat-app { 
            width: 100%; max-width: 800px; height: 100dvh;
            background: var(--chat-bg); display: flex; flex-direction: column; 
            position: relative;
        }

        /* التصميم للهواتف ليملأ الشاشة، وللكمبيوتر ليكون صندوقاً أنيقاً */
        @media (min-width: 800px) {
            .chat-app { height: 85vh; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; }
        .theme-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        /* شاشة البداية */
        #startScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        #startScreen input { width: 100%; max-width: 400px; margin: 20px 0; border: 2px solid var(--border); }
        #startBtn { font-size: 18px; padding: 15px 40px; }

        /* شاشة المحادثة */
        #chatScreen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px 18px; border-radius: 20px; max-width: 75%; word-wrap: break-word; line-height: 1.4; }
        .my-msg { background-color: var(--msg-mine); color: #000; align-self: flex-start; border-bottom-right-radius: 5px; }
        .stranger-msg { background-color: var(--msg-other); color: var(--text-main); align-self: flex-end; border-bottom-left-radius: 5px; }
        .system-msg { align-self: center; color: var(--text-muted); font-size: 0.9em; font-weight: bold; padding: 10px; text-align: center;}
        
        .typing-indicator { align-self: flex-end; font-size: 0.85em; color: var(--text-muted); padding: 0 20px; margin-bottom: 10px; display: none; font-style: italic; }
        
        .input-area { display: flex; padding: 10px 15px; border-top: 1px solid var(--border); gap: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px 20px; border: 1px solid var(--border); border-radius: 25px; outline: none; background: var(--bg-color); color: var(--text-main); font-size: 16px; }
        button { padding: 10px 20px; border: none; background-color: var(--accent); color: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; }
        .skip-btn { background-color: #ff4757; color: white; }
    </style>
</head>
<body>

    <div class="chat-app">
        <div class="header">
            <h1>💬 دردشة عشوائية</h1>
            <button class="theme-btn" onclick="toggleTheme()">الوضع الليلي 🌙</button>
        </div>

        <div id="startScreen">
            <h2>بم تفكر؟</h2>
            <p style="color: var(--text-muted); margin-top: 10px;">أضف اهتماماتك لنجد لك شخصاً يشبهك (افصل بينها بفاصلة)</p>
            <input type="text" id="interestsInput" placeholder="مثال: ألعاب، برمجة، Godot, أفلام...">
            <button id="startBtn">ابدأ الدردشة</button>
        </div>

        <div id="chatScreen">
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typingIndicator">الغريب يكتب الآن... ✍️</div>
            
            <div class="input-area">
                <button class="skip-btn" id="nextBtn">تخطي</button>
                <input type="text" id="msgInput" placeholder="اكتب رسالتك..." disabled>
                <button id="sendBtn" disabled>إرسال</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // عناصر الواجهة
        const startScreen = document.getElementById('startScreen');
        const chatScreen = document.getElementById('chatScreen');
        const interestsInput = document.getElementById('interestsInput');
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let typingTimer;

        // إدارة الوضع الليلي
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-btn');
            if(document.body.classList.contains('dark-mode')) {
                btn.textContent = "الوضع الفاتح ☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.textContent = "الوضع الليلي 🌙";
                localStorage.setItem('theme', 'light');
            }
        }
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        // دوال المراسلة
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.textContent = text; div.className = `message ${type}`;
            messages.appendChild(div); messages.scrollTop = messages.scrollHeight;
        }

        // بدء الدردشة
        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            socket.emit('start chat', interestsInput.value);
        });

        // زر التخطي (بدون تحديث الصفحة)
        nextBtn.addEventListener('click', () => {
            msgInput.disabled = true; sendBtn.disabled = true;
            socket.emit('next');
        });

        // أحداث الخادم
        socket.on('waiting', (msg) => addMessage(msg, 'system-msg'));
        socket.on('chat start', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = false; sendBtn.disabled = false; msgInput.focus();
        });
        socket.on('partner disconnected', (msg) => {
            addMessage(msg, 'system-msg');
            msgInput.disabled = true; sendBtn.disabled = true; typingIndicator.style.display = 'none';
        });
        socket.on('chat message', (msg) => { addMessage(msg, 'stranger-msg'); typingIndicator.style.display = 'none'; });
        socket.on('system clear', () => { messages.innerHTML = ''; typingIndicator.style.display = 'none'; });

        // مؤشر الكتابة وإرسال الرسائل
        msgInput.addEventListener('input', () => {
            socket.emit('typing'); clearTimeout(typingTimer);
            typingTimer = setTimeout(() => { socket.emit('stop typing'); }, 1000);
        });

        socket.on('typing', () => { typingIndicator.style.display = 'block'; messages.scrollTop = messages.scrollHeight; });
        socket.on('stop typing', () => { typingIndicator.style.display = 'none'; });

        function sendMessage() {
            const text = msgInput.value.trim();
            if (text) {
                socket.emit('chat message', text); addMessage(text, 'my-msg');
                msgInput.value = ''; socket.emit('stop typing');
                msgInput.focus();
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
